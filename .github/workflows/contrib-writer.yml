name: Contribution Writer

on:
  schedule:
    - cron: '7 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git author
        env:
          AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
        run: |
          git config user.name "${AUTHOR_NAME}"
          git config user.email "${AUTHOR_EMAIL}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install structlog pydantic

      - name: Run contribution writer
        env:
          TEXT: 'BAREFOOTJOEY'
          START_SUNDAY: '2025-10-12'
          COMMIT_FILE: 'contrib_writer/contrib_log.txt'
          SPACING_COLUMNS: '1'
          FONT_WIDTH: '3'
          FIT_WEEKS: '52'
          MULTI_COMMITS: '50'
        run: |
          set -euo pipefail
      
          # First run decides whether today is scheduled
          python contrib_writer/contrib_writer.py 2>&1 | tee /tmp/contrib_writer.out
      
          if grep -q '"event": "no_commit_today"' /tmp/contrib_writer.out; then
            echo "No scheduled pixel today; skipping intensity commits."
            exit 0
          fi
      
          # Intensify only on scheduled days
          for i in $(seq 1 ${MULTI_COMMITS}); do
            echo "intensity=$i $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> contrib_writer/intensity.txt
            python contrib_writer/contrib_writer.py --mutation-token $i
            git add -A
            git commit -m "🔧 chore: intensity $i" || true
          done
      
          # Push commits even if nothing is staged now
          git fetch origin main --depth 1 || true
          if [ "$(git rev-list --count origin/main..HEAD)" != "0" ]; then
            git push
          else
            echo "No new commits to push."
          fi
